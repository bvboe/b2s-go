<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bjorn2scan - Container Images</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="multi-select-styles.css">
    <link rel="stylesheet" href="custom-styles.css">
</head>
<body>
    <nav class="topbar">
        <span class="brand">Bjørn2Scan</span>
        <div id="topbarNav" class="topbar-links"></div>
    </nav>
    <main class="page-content">
                <h1><div id="clusterName">bjorn2scan</div></h1>

                <div id="imageSummary" class="stats-strip"></div>

                <div class="inline-filters">
                    <form>
                        <label for="namespaceFilter"><b>Namespace:</b></label>
                        <select id="namespaceFilter" name="namespaces" multiple onchange="onFilterChange()">
                        </select>

                        <label for="vulnerabilityStatusFilter"><b>Vulnerability Status:</b></label>
                        <select id="vulnerabilityStatusFilter" name="vulnerabilityStatus" multiple onchange="onFilterChange()">
                        </select>

                        <label for="packageTypeFilter"><b>Vulnerable Package Type:</b></label>
                        <select id="packageTypeFilter" name="packageType" multiple onchange="onFilterChange()">
                        </select>

                        <label for="osNameFilter"><b>OS Distribution:</b></label>
                        <select id="osNameFilter" name="osName" multiple onchange="onFilterChange()">
                        </select>
                    </form>
                </div>

                <div class="table-wrap">
                <div class="csv-row"><a href="" id="csvlink">Export to CSV</a></div>
                <table id="vulnerabilityTable" class="listingTable">
                    <thead>
                        <tr>
                            <th class="sortable" data-sort-field="image" onclick="sortByColumn('image')"><b>Container Image</b></th>
                            <th class="sortable" data-sort-field="total_risk" onclick="sortByColumn('total_risk')"><b>Risk Score</b></th>
                            <th class="sortable" data-sort-field="critical_count" onclick="sortByColumn('critical_count')"><b>Critical</b></th>
                            <th class="sortable" data-sort-field="high_count" onclick="sortByColumn('high_count')"><b>High</b></th>
                            <th class="sortable other-col" data-sort-field="medium_count" onclick="sortByColumn('medium_count')" title="Medium + Low + Negligible + Unknown"><b>Other</b></th>
                            <th class="sortable" data-sort-field="total_cves" onclick="sortByColumn('total_cves')"><b>CVEs (total / unique)</b></th>
                            <th class="sortable" data-sort-field="exploit_count" onclick="sortByColumn('exploit_count')"><b>Exploits</b></th>
                            <th class="sortable" data-sort-field="container_count" onclick="sortByColumn('container_count')"><b>Containers</b></th>
                            <th class="sortable" data-sort-field="package_count" onclick="sortByColumn('package_count')"><b>Packages</b></th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>

                <div id="pagination" style="margin: 20px 0; text-align: center;">
                    <!-- Pagination controls will be inserted here -->
                </div>

                <div id="app-footer"></div>
                </div>
    </main>

    <script src="shared.js"></script>
    <script>
        // Page-specific configuration for images.html
        initSharedPage({
            apiEndpoint: '/api/images',
            dataKey: 'images',
            pageTitle: 'Image Summary',
            currentPageUrl: 'images.html',
            defaultSortBy: 'total_risk',
            defaultSortOrder: 'DESC',
            columnCount: 9,
            renderRow: function(row, item) {
                // Make row clickable to navigate to image detail page
                row.onclick = function() {
                    window.location.href = 'image.html?imageid=' + encodeURIComponent(item.digest);
                };
                row.style.cursor = 'pointer';

                // Two-line image cell: name on top, :tag muted below
                const imageCell = document.createElement('td');
                imageCell.style.textAlign = 'left';
                const ref = item.image || '';
                const colonIdx = lastTagSeparator(ref);
                if (colonIdx > 0) {
                    const namePart = ref.substring(0, colonIdx);
                    const tagPart  = ref.substring(colonIdx);
                    imageCell.innerHTML = `<div class="img-name">${escapeHtml(namePart)}</div><div class="img-tag">${escapeHtml(tagPart)}</div>`;
                } else {
                    imageCell.innerHTML = `<div class="img-name">${escapeHtml(ref)}</div>`;
                }
                row.appendChild(imageCell);

                if (isScanComplete(item.status_description)) {
                    // Risk Score — render "—" for zero risk (consistent with severity columns)
                    const riskCell = document.createElement('td');
                    riskCell.style.textAlign = 'right';
                    if (!item.total_risk) {
                        riskCell.innerHTML = '<span class="zero-dash">—</span>';
                    } else {
                        riskCell.textContent = formatRiskNumber(item.total_risk);
                    }
                    row.appendChild(riskCell);

                    // Critical, High — show "—" for zero
                    addNumOrDash(row, item.critical_count);
                    addNumOrDash(row, item.high_count);

                    // Other = Medium + Low + Negligible + Unknown
                    const other = (item.medium_count || 0) + (item.low_count || 0) +
                                  (item.negligible_count || 0) + (item.unknown_count || 0);
                    const otherCell = addNumOrDash(row, other);
                    if (other > 0) otherCell.classList.add('muted-num');
                    otherCell.title = 'Medium: ' + formatNumber(item.medium_count) +
                                      ' · Low: ' + formatNumber(item.low_count) +
                                      ' · Negligible: ' + formatNumber(item.negligible_count) +
                                      ' · Unknown: ' + formatNumber(item.unknown_count);

                    // CVEs (total / unique) — render "—" when both are zero
                    const cveCell = document.createElement('td');
                    cveCell.style.textAlign = 'right';
                    cveCell.className = 'cve-combo';
                    if (!item.total_cves && !item.unique_cves) {
                        cveCell.innerHTML = '<span class="zero-dash">—</span>';
                    } else {
                        cveCell.innerHTML =
                            `<span class="cve-total">${formatNumber(item.total_cves)}</span>` +
                            `<span class="cve-sep">/</span>` +
                            `<span class="cve-unique">${formatNumber(item.unique_cves)}</span>`;
                    }
                    row.appendChild(cveCell);

                    // Exploits
                    addNumOrDash(row, item.exploit_count);

                    // Containers
                    addCellToRow(row, 'right', formatNumber(item.container_count));

                    // Packages
                    addCellToRow(row, 'right', formatNumber(item.package_count));
                } else {
                    // Show status message spanning all data columns
                    const cell = addCellToRow(row, 'left', item.status_description || 'Unknown status');
                    cell.colSpan = 8;
                }
            }
        });

        // Render number, or "—" when zero. Returns the cell.
        function addNumOrDash(row, value) {
            const v = value || 0;
            const cell = document.createElement('td');
            cell.style.textAlign = 'right';
            if (v === 0) {
                cell.innerHTML = '<span class="zero-dash">—</span>';
            } else {
                cell.textContent = formatNumber(v);
            }
            row.appendChild(cell);
            return cell;
        }

        // Find the position of ':' or '@' that separates the image name from the tag/digest.
        // Returns -1 if not found. Skips ':' inside port numbers in registry hostnames.
        function lastTagSeparator(ref) {
            const at = ref.indexOf('@');
            if (at >= 0) return at;
            // Find last ':' that is not part of "registry:port/" prefix
            const slash = ref.lastIndexOf('/');
            const colon = ref.lastIndexOf(':');
            if (colon > slash) return colon;
            return -1;
        }

        // Load page when DOM is ready
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
